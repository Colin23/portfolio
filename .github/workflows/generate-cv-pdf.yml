name: Generate CV PDF

on:
  push:
    branches: [ main ]
    paths-ignore:
      - 'static/colin-moerbe-cv.pdf'
      - 'static/*-colin-moerbe-cv.pdf'
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  generate-pdf:
    runs-on: ubuntu-latest
    env:
      TZ: UTC
      LANG: C.UTF-8
      LC_ALL: C.UTF-8

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.10"

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Install Playwright Chromium
        run: bunx playwright@1.58.2 install --with-deps chromium

      - name: Build site
        run: bun run build

      - name: Start preview server
        run: |
          bun run preview:ci > preview.log 2>&1 &
          echo $! > preview.pid

      - name: Wait for preview server
        run: |
          for i in {1..30}; do
            if curl -sSf http://127.0.0.1:4173/cv/ > /dev/null; then
              echo "Preview server is up"
              exit 0
            fi
            sleep 1
          done
          echo "Preview server did not start in time"
          cat preview.log
          exit 1

      - name: Generate CV PDF
        run: bun run generate:cv-pdf

      - name: Stop preview server
        if: always()
        run: |
          if [ -f preview.pid ]; then kill "$(cat preview.pid)" || true; fi

      - name: Install qpdf
        run: sudo apt-get update && sudo apt-get install -y qpdf

      - name: Normalize generated PDFs
        shell: bash
        run: |
          for f in static/colin-moerbe-cv.pdf static/*-colin-moerbe-cv.pdf; do
            [ -f "$f" ] || continue
            qpdf --linearize "$f" "${f}.normalized"
            mv "${f}.normalized" "$f"
          done

      - name: Collect changed PDF paths for PR commit
        id: pdf_paths
        shell: bash
        run: |
          mapfile -t changed_pdfs < <(
            {
              git diff --name-only -- \
                static/colin-moerbe-cv.pdf \
                'static/*-colin-moerbe-cv.pdf'
              git ls-files --others --exclude-standard -- \
                static/colin-moerbe-cv.pdf \
                'static/*-colin-moerbe-cv.pdf'
            } | sort -u
          )

          if [ "${#changed_pdfs[@]}" -eq 0 ]; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          {
            echo "changed=true"
            echo "add_paths<<EOF"
            for file in "${changed_pdfs[@]}"; do
              echo "$file"
            done
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Create pull request for updated PDFs
        if: steps.pdf_paths.outputs.changed == 'true'
        uses: peter-evans/create-pull-request@v8
        with:
          commit-message: "chore: regenerate CV PDFs"
          title: "chore: regenerate CV PDFs"
          body: "Automated update of stable and dated CV PDFs."
          branch: "chore/update-cv-pdf"
          delete-branch: true
          add-paths: ${{ steps.pdf_paths.outputs.add_paths }}
