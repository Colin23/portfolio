version: 2

updates:
  # Bun/JS dependencies from package.json + bun.lock
  - package-ecosystem: "bun"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "06:00"
      timezone: "Europe/Berlin"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
    groups:
      js-dev-dependencies:
        dependency-type: "development"
      js-prod-dependencies:
        dependency-type: "production"

  # Keep GitHub Actions in .github/workflows up to date
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "06:15"
      timezone: "Europe/Berlin"
    open-pull-requests-limit: 3
    labels:
      - "dependencies"
      - "ci"
