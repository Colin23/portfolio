[build]
command = "bun run build"
publish = "build"

[[headers]]
for = "/*"
[headers.values]
X-Frame-Options = "DENY"
X-Content-Type-Options = "nosniff"
Referrer-Policy = "strict-origin-when-cross-origin"
Permissions-Policy = "geolocation=(), camera=(), microphone=()"
Strict-Transport-Security = "max-age=31536000; includeSubDomains; preload"
Content-Security-Policy = "default-src 'self'; img-src 'self' data: https:; style-src 'self' 'unsafe-inline'; script-src 'self' 'unsafe-inline'; font-src 'self' data:; connect-src 'self'; frame-ancestors 'none'; base-uri 'self'; form-action 'self'"

[[redirects]]
from = "https://colin-moerbe.com/*"
to = "https://colinmoerbe.com/:splat"
status = 301
force = true

[[redirects]]
from = "https://www.colin-moerbe.com/*"
to = "https://colinmoerbe.com/:splat"
status = 301
force = true
